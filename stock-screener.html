<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票分析工具</title>
<style>
:root { --bg: #f5f6fa; --card: #fff; --text: #2d3436; --sub: #636e72; --accent: #2563eb; --accent2: #059669; --red: #dc2626; --green: #16a34a; --border: #e5e7eb; --hover: #f8fafc; --tag-bg: #eff6ff; --tag-text: #1d4ed8; --warn-bg: #fffbeb; --warn-text: #92400e; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

/* Layout */
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.app-header h1 { font-size: 18px; font-weight: 700; }
.app-header .badge { font-size: 11px; background: var(--tag-bg); color: var(--tag-text); padding: 3px 8px; border-radius: 10px; margin-left: 6px; }
.app-header-actions { display: flex; gap: 8px; align-items: center; }
.header-time { font-size: 11px; color: var(--sub); }

.main { display: flex; min-height: calc(100vh - 56px); }

/* Sidebar Tabs */
.sidebar { width: 68px; background: #fff; border-right: 1px solid var(--border); padding: 8px 0; flex-shrink: 0; }
.tab-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 100%; padding: 14px 4px; border: none; background: transparent; cursor: pointer; font-size: 10px; color: var(--sub); transition: all .15s; border-left: 3px solid transparent; }
.tab-btn:hover { background: var(--hover); color: var(--text); }
.tab-btn.active { color: var(--accent); background: #eff6ff; border-left-color: var(--accent); font-weight: 600; }
.tab-btn .tab-icon { font-size: 20px; }

/* Content */
.content { flex: 1; padding: 20px 24px; max-width: 1600px; min-width: 0; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Card */
.card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 18px 20px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 20px; text-align: center; }

/* NL Input */
.nl-input-wrap { margin-bottom: 14px; position: relative; }
.nl-input { width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; transition: border .2s; background: #fafbfc; }
.nl-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
.nl-hint { font-size: 11px; color: #adb5bd; margin-top: 4px; }
.nl-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #eff6ff; color: var(--accent); margin: 2px 4px; cursor: pointer; }
.nl-tag:hover { background: #dbeafe; }

/* Condition Form */
.cond-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 16px; }
.cond-item { display: flex; flex-direction: column; gap: 3px; }
.cond-item label { font-size: 12px; color: var(--sub); font-weight: 600; }
.cond-item .input-row { display: flex; gap: 4px; align-items: center; }
.cond-item input, .cond-item select { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; }
.cond-item input:focus, .cond-item select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
.cond-item .range-sep { font-size: 13px; color: var(--sub); flex-shrink: 0; }
.cond-item .unit { font-size: 11px; color: var(--sub); margin-top: 1px; }
.cond-item.matched input, .cond-item.matched select { border-color: var(--accent); background: #f8faff; }
.mode-toggle { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; padding: 5px 14px; border: 1px solid var(--border); border-radius: 6px; background: #f9fafb; }
.mode-toggle.checked { background: #eff6ff; border-color: var(--accent); color: var(--accent); font-weight: 600; }
.mode-toggle input { display: none; }

/* Buttons */
.btn { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: #fff; color: var(--text); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* Table */
.summary-bar { display: flex; gap: 20px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.summary-bar .stat { text-align: center; }
.summary-bar .stat .num { font-size: 24px; font-weight: 700; color: var(--accent); }
.summary-bar .stat .lbl { font-size: 11px; color: var(--sub); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--sub); font-weight: 600; font-size: 12px; white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { color: var(--accent); }
th .sort-arrow { font-size: 10px; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { cursor: pointer; }
tbody tr:hover td { background: #eff6ff; }
.stock-code { font-family: monospace; font-size: 12px; color: var(--sub); }
.stock-name { font-weight: 600; }
.up { color: var(--red); }
.down { color: var(--green); }
.tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
.tag-bull { background: #fef2f2; color: var(--red); }
.tag-bear { background: #f0fdf4; color: var(--green); }
.tag-neutral { background: #f9fafb; color: var(--sub); }
.analysis-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.analysis-box { background: #f9fafb; border-radius: 8px; padding: 14px; }
.analysis-box h4 { font-size: 13px; color: var(--sub); margin-bottom: 8px; }
.analysis-box .item { font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.analysis-box .item:last-child { border-bottom: none; }
.analysis-box .item .label { color: var(--sub); }
.analysis-box .item .value { font-weight: 600; float: right; }
.insight { padding: 8px 12px; border-left: 3px solid var(--accent); background: #f0f7ff; border-radius: 0 6px 6px 0; font-size: 13px; margin-top: 6px; }
.insight.warn { border-color: #f59e0b; background: #fffbeb; }
.insight.good { border-color: var(--accent2); background: #f0fdf4; }

/* Loading */
.loading-overlay { display: none; text-align: center; padding: 40px; }
.loading-overlay.show { display: block; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--sub); }
.empty { text-align: center; padding: 50px 20px; color: var(--sub); }
.empty .big { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 14px; }
.error-msg { padding: 12px 16px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; color: var(--red); font-size: 13px; margin-bottom: 12px; display: none; }
.error-msg.show { display: block; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 1000; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; width: 90vw; max-width: 1000px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #fff; z-index: 1; }
.modal-header h2 { font-size: 17px; }
.modal-close { width: 32px; height: 32px; border: none; background: #f3f4f6; border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: #e5e7eb; }
.modal-body { padding: 20px; }
.modal-stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 16px; }
.modal-stat { text-align: center; padding: 10px 6px; background: #f9fafb; border-radius: 8px; }
.modal-stat .val { font-size: 18px; font-weight: 700; }
.modal-stat .lbl { font-size: 11px; color: var(--sub); margin-top: 2px; }
.modal-ma { display: flex; gap: 16px; margin-bottom: 12px; font-size: 13px; }
.modal-ma span { padding: 4px 10px; border-radius: 4px; background: #f3f4f6; }
.chart-container { position: relative; width: 100%; }
.chart-container canvas { width: 100%; height: auto; }
.chart-legend { display: flex; gap: 16px; margin-bottom: 8px; font-size: 12px; }
.chart-legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

@media (max-width: 900px) { .cond-grid { grid-template-columns: repeat(2, 1fr); } .analysis-grid { grid-template-columns: 1fr; } .modal-stats { grid-template-columns: repeat(3, 1fr); } .sidebar { width: 56px; } .tab-btn { padding: 10px 2px; } }
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <div><h1>📊 股票分析工具 <span class="badge">v2.4</span></h1></div>
  <div class="app-header-actions">
    <span class="header-time" id="updateTime">就绪</span>
    <button class="btn btn-sm" onclick="exportCSV()">⬇ 导出CSV</button>
  </div>
</div>

<div class="main">

<!-- Sidebar -->
<div class="sidebar">
  <button class="tab-btn active" data-tab="screener" onclick="switchTab('screener')">
    <span class="tab-icon">🔍</span><span>选股</span>
  </button>
  <button class="tab-btn" data-tab="limitup" onclick="switchTab('limitup')">
    <span class="tab-icon">📈</span><span>涨停</span>
  </button>
  <button class="tab-btn" data-tab="moneyflow" onclick="switchTab('moneyflow')">
    <span class="tab-icon">💰</span><span>资金</span>
  </button>
</div>

<!-- Content -->
<div class="content">

<!-- ====== Tab: 选股 ====== -->
<div class="tab-content active" id="tabScreener">

  <div class="card">
    <div class="card-title"><span class="icon">💬</span> 自然语言输入</div>
    <div class="nl-input-wrap">
      <input class="nl-input" id="nlInput" type="text" placeholder="例如：流通市值30到120亿，均线多头排列，近10天至少涨停1次，换手率3%到15%" onkeydown="if(event.key==='Enter')parseNL()">
      <div class="nl-hint">
        快捷：<span class="nl-tag" onclick="fillExample('default')">老大默认条件</span>
        <span class="nl-tag" onclick="fillExample('small_cap')">小盘成长</span>
        <span class="nl-tag" onclick="fillExample('blue_chip')">大盘白马</span>
        <span class="nl-tag" onclick="fillExample('breakout')">突破形态</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-primary" onclick="parseNL()">✨ 解析条件</button>
      <button class="btn btn-sm" onclick="document.getElementById('nlInput').value=''; clearNLHighlights()">清除</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">🔍</span> 选股条件</div>
    <div class="cond-grid">
      <div class="cond-item" data-field="exclude_st">
        <label>排除ST / *ST</label>
        <select id="f_exclude_st"><option value="1">是</option><option value="0">否</option></select>
      </div>
      <div class="cond-item" data-field="min_listed_days">
        <label>上市天数 ≥</label>
        <div class="input-row"><input id="f_min_listed_days" type="number" value="60" min="0"></div>
        <span class="unit">自然日</span>
      </div>
      <div class="cond-item" data-field="float_mcap">
        <label>流通市值区间</label>
        <div class="input-row">
          <input id="f_float_mcap_min" type="number" value="30" min="0" step="1" style="width:60px">
          <span class="range-sep">~</span>
          <input id="f_float_mcap_max" type="number" value="120" min="0" step="1" style="width:60px">
        </div>
        <span class="unit">亿元</span>
      </div>
      <div class="cond-item" data-field="chg_20d">
        <label>20日区间涨跌幅</label>
        <div class="input-row">
          <input id="f_chg_20d_min" type="number" value="0" step="0.1" style="width:60px">
          <span class="range-sep">~</span>
          <input id="f_chg_20d_max" type="number" value="50" step="0.1" style="width:60px">
        </div>
        <span class="unit">%</span>
      </div>
      <div class="cond-item" data-field="ma_bullish">
        <label>均线排列</label>
        <select id="f_ma_bullish"><option value="1">MA5 &gt; MA10 &gt; MA20（多头）</option><option value="0">不限</option></select>
      </div>
      <div class="cond-item" data-field="close_above_ma5">
        <label>收盘价 vs MA5</label>
        <select id="f_close_above_ma5"><option value="1">收盘价 &gt; 5日均线</option><option value="0">不限</option></select>
      </div>
      <div class="cond-item" data-field="limit_up">
        <label>近10天涨停次数 ≥</label>
        <div class="input-row"><input id="f_min_limit_up_10d" type="number" value="1" min="0" max="10"></div>
        <span class="unit">次</span>
      </div>
      <div class="cond-item" data-field="turnover">
        <label>换手率区间</label>
        <div class="input-row">
          <input id="f_turnover_min" type="number" value="3" step="0.1" style="width:60px">
          <span class="range-sep">~</span>
          <input id="f_turnover_max" type="number" value="15" step="0.1" style="width:60px">
        </div>
        <span class="unit">%</span>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <button class="btn btn-primary" id="btnAnalyze" onclick="runAnalysis()">🔍 开始分析</button>
      <button class="btn btn-sm" onclick="resetDefaults()">↺ 默认条件</button>
      <div style="display:flex;gap:6px;align-items:center;">
        <span style="font-size:12px;color:var(--sub);">模式:</span>
        <label class="mode-toggle checked" id="modeFull" onclick="setMode('full')"><input type="radio" name="m" value="full" checked><span>🌐 全市场</span></label>
        <label class="mode-toggle" id="modeFast" onclick="setMode('fast')"><input type="radio" name="m" value="fast"><span>⚡ 快速</span></label>
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text">正在分析...</div></div>
  <div class="error-msg" id="errorMsg"></div>

  <div id="resultsSection" style="display:none;">
    <div class="card">
      <div class="card-title"><span class="icon">📋</span> 筛选结果 <span style="font-size:11px;color:var(--sub);font-weight:400;">（点击行查看K线）</span></div>
      <div class="summary-bar" id="summaryBar"></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th data-sort="code" onclick="sortTable('code')">代码</th>
            <th data-sort="name" onclick="sortTable('name')">名称</th>
            <th data-sort="price" onclick="sortTable('price')">现价</th>
            <th data-sort="change_pct" onclick="sortTable('change_pct')">涨跌幅</th>
            <th data-sort="pe" onclick="sortTable('pe')">PE</th>
            <th data-sort="float_mcap" onclick="sortTable('float_mcap')">流通市值</th>
            <th data-sort="turnover" onclick="sortTable('turnover')">换手率</th>
            <th data-sort="chg_20d" onclick="sortTable('chg_20d')">20日涨幅</th>
            <th data-sort="ma_status" onclick="sortTable('ma_status')">均线</th>
            <th data-sort="limit_up_count_10d" onclick="sortTable('limit_up_count_10d')">涨停(10d)</th>
            <th data-sort="score" onclick="sortTable('score')">评分 <span class="sort-arrow"></span></th>
          </tr></thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">📈</span> 综合分析报告</div>
      <div class="analysis-grid" id="analysisGrid"></div>
    </div>
  </div>

  <div class="empty" id="emptyState">
    <div class="big">🔎</div>
    <p>输入选股条件后点击「开始分析」</p>
  </div>
</div>

<!-- ====== Tab: 涨停 ====== -->
<div class="tab-content" id="tabLimitUp">
  <div class="card">
    <div class="card-title"><span class="icon">📊</span> 涨停板统计 <button class="btn btn-sm" onclick="loadLimitUp()" style="margin-left:auto">⟳ 刷新</button></div>
    <div id="limitUpPanel" style="font-size:13px;color:var(--sub);padding:8px 0;">加载中...</div>
  </div>
</div>

<!-- ====== Tab: 资金 ====== -->
<div class="tab-content" id="tabMoneyFlow">
  <div class="card">
    <div class="card-title"><span class="icon">💰</span> 主力资金流向 <button class="btn btn-sm" onclick="loadMoneyFlow()" style="margin-left:auto">⟳ 刷新</button></div>
    <div id="moneyFlowPanel" style="font-size:13px;color:var(--sub);padding:8px 0;">加载中...</div>
  </div>
</div>

</div><!-- /content -->
</div><!-- /main -->

<!-- K-line Modal -->
<div class="modal-overlay" id="klineModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="klineTitle">K线图</h2>
      <button class="modal-close" onclick="closeKline()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-stats" id="klineStats"></div>
      <div class="modal-ma" id="klineMA"></div>
      <div class="chart-container"><canvas id="klineCanvas"></canvas></div>
      <div class="chart-legend" style="margin-top:8px;">
        <span><span class="dot" style="background:#dc2626"></span>阳线</span>
        <span><span class="dot" style="background:#16a34a"></span>阴线</span>
        <span><span class="dot" style="background:#f59e0b"></span>MA5</span>
        <span><span class="dot" style="background:#3b82f6"></span>MA10</span>
        <span><span class="dot" style="background:#8b5cf6"></span>MA20</span>
      </div>
    </div>
  </div>
</div>

<script>
let results = [], currentSort = 'score', sortDir = -1, screenerMode = 'full';

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  const tabIds = { screener: 'tabScreener', limitup: 'tabLimitUp', moneyflow: 'tabMoneyFlow' };
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tabIds[name]));
  if (name === 'limitup') loadLimitUp();
  if (name === 'moneyflow') loadMoneyFlow();
}

// ── Mode toggle ──
function setMode(m) { screenerMode = m; document.getElementById('modeFast').classList.toggle('checked', m==='fast'); document.getElementById('modeFull').classList.toggle('checked', m==='full'); }

// ── NL Input ──
function fillExample(type) {
  const ex = { default:'排除ST，上市大于60天，流通市值30到120亿，20日涨幅0到50%，均线多头排列，收盘价大于5日均线，近10天涨停至少1次，换手率3%到15%', small_cap:'流通市值20到50亿，换手率5%到20%，近10天涨停至少1次，均线多头，非ST', blue_chip:'排除ST，流通市值100到500亿，PE小于30，均线多头，涨跌幅-5到10%，换手率2%到10%', breakout:'换手率8%到30%，近10天涨停至少2次，20天涨幅大于0，均线多头排列，收盘价在5日均线以上' };
  document.getElementById('nlInput').value = ex[type] || ex.default;
}
function parseNL() {
  const t = document.getElementById('nlInput').value.trim();
  if (!t) return;
  const f = { exclude_st:'1', min_listed_days:0, float_mcap_min:0, float_mcap_max:999999, chg_20d_min:-999, chg_20d_max:999, ma_bullish:'0', close_above_ma5:'0', min_limit_up_10d:0, turnover_min:0, turnover_max:999 };
  const m = new Set();
  if (/排[除出]/.test(t) && /ST/.test(t)) { f.exclude_st='1'; m.add('exclude_st'); }
  const ld = t.match(/上市[大于≥超过]*\s*(\d+)/); if (ld) { f.min_listed_days = parseInt(ld[1]); m.add('min_listed_days'); }
  const mr = t.match(/(?:流通)?市值\s*(\d+)\s*[~\-到至]*\s*(\d+)\s*亿/); if (mr) { f.float_mcap_min=parseFloat(mr[1]); f.float_mcap_max=parseFloat(mr[2]); m.add('float_mcap'); }
  const cr = t.match(/(?:20日|二十日)\s*(?:区间)?(?:涨跌幅?)\s*([-\d.]+)\s*[~\-到至%]*\s*([-\d.]+)/); if (cr) { f.chg_20d_min=parseFloat(cr[1]); f.chg_20d_max=parseFloat(cr[2]); m.add('chg_20d'); }
  if (/均线多头|多头排列/.test(t)) { f.ma_bullish='1'; m.add('ma_bullish'); }
  if (/收盘价[大于≥].*(?:5日|MA5)/.test(t)||/站在.*5日.*上方/.test(t)) { f.close_above_ma5='1'; m.add('close_above_ma5'); }

function drawKline(kdata,code,name) {
  const bars=[...(kdata.data||[])].reverse(), ma=kdata.ma||{}; if(!bars.length)return;
  const w=950,h=400,pad={top:30,right:80,bottom:60,left:60},pw=w-pad.left-pad.right,ph=h-pad.top-pad.bottom;
  const highs=bars.map(b=>b.high),lows=bars.map(b=>b.low),maxH=Math.max(...highs),minL=Math.min(...lows),range=maxH-minL||1,sy=ph/range,sx=pw/(bars.length-1||1);
  const c=document.getElementById('klineCanvas'); c.width=w*2;c.height=h*2;c.style.width='950px';c.style.height='400px';
  const ctx=c.getContext('2d'); ctx.scale(2,2); ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#f0f0f0';ctx.lineWidth=0.5;
  for(let i=0;i<=5;i++){const y=pad.top+(ph/5)*i;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();ctx.fillStyle='#9ca3af';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText((maxH-(range/5)*i).toFixed(2),pad.left-6,y+4);}
  ctx.fillStyle='#9ca3af';ctx.font='10px sans-serif';
  [0,Math.floor(bars.length/4),Math.floor(bars.length/2),Math.floor(bars.length*3/4),bars.length-1].forEach(idx=>{if(idx>=bars.length)return;const x=pad.left+idx*sx;ctx.save();ctx.translate(x,h-pad.bottom+10);ctx.rotate(-0.5);ctx.fillText((bars[idx].date||'').slice(5),0,0);ctx.restore();ctx.strokeStyle='#d0d0d0';ctx.beginPath();ctx.moveTo(x,pad.top);ctx.lineTo(x,h-pad.bottom);ctx.stroke();});
  const vm=Math.max(...bars.map(b=>b.volume||0),1),vh=40,vt=h-pad.bottom+18;
  bars.forEach((b,i)=>{const x=pad.left+i*sx;const vp=(b.volume||0)/vm;ctx.fillStyle=b.close>=b.open?'rgba(220,38,38,0.4)':'rgba(22,163,74,0.4)';ctx.fillRect(Math.max(0,x-1),vt-vp*vh,Math.max(2,sx*0.6),vp*vh);});
  const bw=Math.max(1,sx*0.65);
  bars.forEach((b,i)=>{const x=pad.left+i*sx;const isUp=b.close>=b.open;const bt=pad.top+(maxH-(isUp?b.close:b.open))*sy;const bb=pad.top+(maxH-(isUp?b.open:b.close))*sy;const bh=Math.max(1,bb-bt);const wh=pad.top+(maxH-b.high)*sy;const wl=pad.top+(maxH-b.low)*sy;ctx.strokeStyle=isUp?'#dc2626':'#16a34a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,wh);ctx.lineTo(x,wl);ctx.stroke();ctx.fillStyle=isUp?'#dc2626':'#16a34a';ctx.fillRect(x-bw/2,bt,bw,bh);});
  const mc={ma5:'#f59e0b',ma10:'#3b82f6',ma20:'#8b5cf6'};
  Object.entries(mc).forEach(([k,c])=>{const v=ma[k]||[];if(!v.length)return;ctx.strokeStyle=c;ctx.lineWidth=1.2;ctx.setLineDash([4,2]);ctx.beginPath();let started=false;bars.forEach((b,i)=>{const val=v[i];if(val==null||val===0){started=false;return;}const x=pad.left+i*sx,y=pad.top+(maxH-val)*sy;if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);});ctx.stroke();ctx.setLineDash([]);});
  if(bars.length){const lc=bars[bars.length-1].close;const y=pad.top+(maxH-lc)*sy;ctx.strokeStyle='#6b7280';ctx.lineWidth=0.8;ctx.setLineDash([2,4]);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#6b7280';ctx.font='10px monospace';ctx.textAlign='left';ctx.fillText(lc.toFixed(2),w-pad.right+4,y+3);}
  const last=bars[bars.length-1],prev=bars.length>1?bars[bars.length-2]:last;
  const chgPct=prev.close?((last.close-prev.close)/prev.close*100):0;
  const chg20=bars.length>=21?((bars[bars.length-1].close-bars[bars.length-21].close)/bars[bars.length-21].close*100):null;
  const ma5v=ma.ma5?ma.ma5[ma.ma5.length-1]:null;
  document.getElementById('klineStats').innerHTML=`<div class="modal-stat"><div class="val" style="color:${chgPct>=0?'var(--red)':'var(--green)'}">${last.close.toFixed(2)}</div><div class="lbl">收盘价</div></div><div class="modal-stat"><div class="val" style="color:${chgPct>=0?'var(--red)':'var(--green)'}">${chgPct>=0?'+':''}${chgPct.toFixed(2)}%</div><div class="lbl">日涨跌</div></div><div class="modal-stat"><div class="val">${last.volume?(last.volume/10000).toFixed(0)+'万':'--'}</div><div class="lbl">成交量</div></div><div class="modal-stat"><div class="val">${last.high.toFixed(2)}</div><div class="lbl">最高</div></div><div class="modal-stat"><div class="val">${last.low.toFixed(2)}</div><div class="lbl">最低</div></div><div class="modal-stat"><div class="val">${chg20!=null?(chg20>=0?'+':'')+chg20.toFixed(1)+'%':'--'}</div><div class="lbl">20日涨幅</div></div>`;
  document.getElementById('klineMA').innerHTML=`<span style="color:#f59e0b">MA5: ${ma5v?ma5v.toFixed(2):'--'}</span><span style="color:#3b82f6">MA10: ${ma.ma10?ma.ma10[ma.ma10.length-1]?.toFixed(2):'--'}</span><span style="color:#8b5cf6">MA20: ${ma.ma20?ma.ma20[ma.ma20.length-1]?.toFixed(2):'--'}</span>`;
}
</script>
