<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票条件选股分析</title>
<style>
:root { --bg: #f5f6fa; --card: #fff; --text: #2d3436; --sub: #636e72; --accent: #2563eb; --accent2: #059669; --red: #dc2626; --green: #16a34a; --border: #e5e7eb; --hover: #f8fafc; --tag-bg: #eff6ff; --tag-text: #1d4ed8; --warn-bg: #fffbeb; --warn-text: #92400e; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
.container { max-width: 1600px; margin: 0 auto; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.header h1 { font-size: 22px; font-weight: 700; }
.header .badge { font-size: 12px; background: var(--tag-bg); color: var(--tag-text); padding: 4px 10px; border-radius: 12px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.header-actions .time { font-size: 12px; color: var(--sub); }

/* Card */
.card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 18px 20px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card-title .icon { width: 20px; text-align: center; }

/* Condition Form - 3 rows x 4 cols */
.cond-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 16px; }
.cond-item { display: flex; flex-direction: column; gap: 3px; }
.cond-item label { font-size: 12px; color: var(--sub); font-weight: 600; }
.cond-item .input-row { display: flex; gap: 4px; align-items: center; }
.cond-item input, .cond-item select { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; transition: border .2s; }
.cond-item input:focus, .cond-item select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
.cond-item .range-sep { font-size: 13px; color: var(--sub); flex-shrink: 0; }
.cond-item .unit { font-size: 11px; color: var(--sub); margin-top: 1px; }

/* Toggle row */
.cond-toggle { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
.cond-toggle label.toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: #f9fafb; transition: all .15s; }
.cond-toggle label.toggle.checked { background: #eff6ff; border-color: var(--accent); color: var(--accent); }
.cond-toggle label.toggle input { display: none; }

/* Mode toggle (快速/全市场) */
.mode-toggle { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; padding: 5px 14px; border: 1px solid var(--border); border-radius: 6px; background: #f9fafb; transition: all .15s; }
.mode-toggle.checked { background: #eff6ff; border-color: var(--accent); color: var(--accent); font-weight: 600; }
.mode-toggle input { display: none; }

/* Buttons */
.btn { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #1d4ed8; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary { background: #fff; color: var(--text); }
.btn-secondary:hover { background: var(--hover); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-accent { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.btn-accent:hover { background: #047857; }

/* Results summary */
.summary-bar { display: flex; gap: 20px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.summary-bar .stat { text-align: center; }
.summary-bar .stat .num { font-size: 24px; font-weight: 700; color: var(--accent); }
.summary-bar .stat .lbl { font-size: 11px; color: var(--sub); }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--sub); font-weight: 600; font-size: 12px; white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { color: var(--accent); }
th .sort-arrow { font-size: 10px; }
td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
tr:hover td { background: var(--hover); }
tr.selected td { background: #eff6ff; }
.stock-code { font-family: 'Consolas', 'Courier New', monospace; font-size: 12px; color: var(--sub); }
.stock-name { font-weight: 600; }
.up { color: var(--red); }
.down { color: var(--green); }
.tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
.tag-bull { background: #fef2f2; color: var(--red); }
.tag-bear { background: #f0fdf4; color: var(--green); }
.tag-neutral { background: #f9fafb; color: var(--sub); }
.tag-gold { background: #fffbeb; color: #d97706; }
.highlight { background: #fefce8 !important; }

/* Analysis Panel */
.analysis-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.analysis-box { background: #f9fafb; border-radius: 8px; padding: 14px; }
.analysis-box h4 { font-size: 13px; color: var(--sub); margin-bottom: 8px; }
.analysis-box .item { font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.analysis-box .item:last-child { border-bottom: none; }
.analysis-box .item .label { color: var(--sub); }
.analysis-box .item .value { font-weight: 600; float: right; }
.insight { padding: 8px 12px; border-left: 3px solid var(--accent); background: #f0f7ff; border-radius: 0 6px 6px 0; font-size: 13px; margin-top: 6px; }
.insight.warn { border-color: #f59e0b; background: #fffbeb; }
.insight.good { border-color: var(--accent2); background: #f0fdf4; }

/* Loading */
.loading-overlay { display: none; text-align: center; padding: 40px; }
.loading-overlay.show { display: block; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--sub); }

/* Empty state */
.empty { text-align: center; padding: 50px 20px; color: var(--sub); }
.empty .big { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 14px; }

/* Error */
.error-msg { padding: 12px 16px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; color: var(--red); font-size: 13px; margin-bottom: 12px; display: none; }
.error-msg.show { display: block; }

/* Responsive */
@media (max-width: 1100px) { .cond-grid { grid-template-columns: repeat(2, 1fr); } .analysis-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>📊 股票条件选股分析 <span class="badge">v2.1</span></h1>
    </div>
    <div class="header-actions">
      <span class="time" id="updateTime">就绪</span>
      <button class="btn btn-secondary btn-sm" onclick="resetDefaults()">↺ 默认条件</button>
      <button class="btn btn-secondary btn-sm" onclick="exportCSV()">⬇ 导出CSV</button>
    </div>
  </div>

  <!-- Condition Input Card -->
  <div class="card">
    <div class="card-title"><span class="icon">🔍</span> 选股条件</div>
    <div class="cond-grid">
      <div class="cond-item">
        <label>排除ST / *ST</label>
        <select id="f_exclude_st"><option value="1">是</option><option value="0">否</option></select>
      </div>
      <div class="cond-item">
        <label>上市天数 ≥</label>
        <div class="input-row"><input id="f_min_listed_days" type="number" value="60" min="0"></div>
        <span class="unit">自然日</span>
      </div>
      <div class="cond-item">
        <label>流通市值区间</label>
        <div class="input-row">
          <input id="f_float_mcap_min" type="number" value="30" min="0" step="1" style="width:60px">
          <span class="range-sep">~</span>
          <input id="f_float_mcap_max" type="number" value="120" min="0" step="1" style="width:60px">
        </div>
        <span class="unit">亿元</span>
      </div>
      <div class="cond-item">
        <label>20日区间涨跌幅</label>
        <div class="input-row">
          <input id="f_chg_20d_min" type="number" value="0" step="0.1" style="width:60px">
          <span class="range-sep">~</span>
          <input id="f_chg_20d_max" type="number" value="50" step="0.1" style="width:60px">
        </div>
        <span class="unit">%</span>
      </div>
      <div class="cond-item">
        <label>均线排列</label>
        <select id="f_ma_bullish"><option value="1">MA5 &gt; MA10 &gt; MA20（多头）</option><option value="0">不限</option></select>
      </div>
      <div class="cond-item">
        <label>收盘价 vs MA5</label>
        <select id="f_close_above_ma5"><option value="1">收盘价 &gt; 5日均线</option><option value="0">不限</option></select>
      </div>
      <div class="cond-item">
        <label>近10天涨停次数 ≥</label>
        <div class="input-row"><input id="f_min_limit_up_10d" type="number" value="1" min="0" max="10"></div>
        <span class="unit">次</span>
      </div>
      <div class="cond-item">
        <label>换手率区间</label>
        <div class="input-row">
          <input id="f_turnover_min" type="number" value="3" step="0.1" style="width:60px">
          <span class="range-sep">~</span>
          <input id="f_turnover_max" type="number" value="15" step="0.1" style="width:60px">
        </div>
        <span class="unit">%</span>
      </div>
    </div>
    <div style="margin-top: 14px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <button class="btn btn-primary" id="btnAnalyze" onclick="runAnalysis()">🔍 开始分析</button>
      <div style="display: flex; gap: 6px; align-items: center;">
        <span style="font-size: 12px; color: var(--sub);">筛选模式:</span>
        <label class="mode-toggle" id="modeFast" onclick="setMode('fast')">
          <input type="radio" name="screener_mode" value="fast" checked>
          <span>⚡ 快速</span>
        </label>
        <label class="mode-toggle checked" id="modeFull" onclick="setMode('full')">
          <input type="radio" name="screener_mode" value="full">
          <span>🌐 全市场</span>
        </label>
      </div>
      <span style="font-size: 12px; color: var(--sub);">数据来源: 新浪财经 全A股 K线</span>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">正在获取数据并分析中...</div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Results Section (hidden until analysis) -->
  <div id="resultsSection" style="display:none;">

    <!-- Summary Bar -->
    <div class="card">
      <div class="card-title"><span class="icon">📋</span> 筛选结果</div>
      <div class="summary-bar" id="summaryBar"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-sort="code" onclick="sortTable('code')">代码 <span class="sort-arrow"></span></th>
              <th data-sort="name" onclick="sortTable('name')">名称</th>
              <th data-sort="price" onclick="sortTable('price')">现价</th>
              <th data-sort="change_pct" onclick="sortTable('change_pct')">涨跌幅 <span class="sort-arrow"></span></th>
              <th data-sort="pe" onclick="sortTable('pe')">PE</th>
              <th data-sort="float_mcap" onclick="sortTable('float_mcap')">流通市值</th>
              <th data-sort="turnover" onclick="sortTable('turnover')">换手率</th>
              <th data-sort="chg_20d" onclick="sortTable('chg_20d')">20日涨幅</th>
              <th data-sort="ma_status" onclick="sortTable('ma_status')">均线</th>
              <th data-sort="limit_up_count_10d" onclick="sortTable('limit_up_count_10d')">涨停(10d)</th>
              <th data-sort="score" onclick="sortTable('score')">评分 <span class="sort-arrow"></span></th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Analysis Panel -->
    <div class="card">
      <div class="card-title"><span class="icon">📈</span> 综合分析报告</div>
      <div class="analysis-grid" id="analysisGrid"></div>
    </div>

  </div>

  <!-- Empty State -->
  <div class="empty" id="emptyState">
    <div class="big">🔎</div>
    <p>请输入选股条件，点击<b>「开始分析」</b><br>系统将从 A 股市场中筛选符合条件的股票并生成分析报告</p>
  </div>

</div>

<script>
// ── State ──
let results = [];
let currentSort = 'score';
let sortDir = -1; // -1=desc, 1=asc
let screenerMode = 'full'; // 'fast' | 'full'

// ── Mode toggle ──
function setMode(mode) {
  screenerMode = mode;
  document.getElementById('modeFast').classList.toggle('checked', mode === 'fast');
  document.getElementById('modeFull').classList.toggle('checked', mode === 'full');
  // 确保 radio button 同步
  document.querySelector('input[name="screener_mode"][value="fast"]').checked = (mode === 'fast');
  document.querySelector('input[name="screener_mode"][value="full"]').checked = (mode === 'full');
}

// ── Collect filters from form ──
function getFilters() {
  return {
    exclude_st: document.getElementById('f_exclude_st').value === '1',
    min_listed_days: parseInt(document.getElementById('f_min_listed_days').value) || 0,
    float_mcap_min: parseFloat(document.getElementById('f_float_mcap_min').value) || 0,
    float_mcap_max: parseFloat(document.getElementById('f_float_mcap_max').value) || 999999,
    chg_20d_min: parseFloat(document.getElementById('f_chg_20d_min').value) || -999,
    chg_20d_max: parseFloat(document.getElementById('f_chg_20d_max').value) || 999,
    ma_bullish: document.getElementById('f_ma_bullish').value === '1',
    close_above_ma5: document.getElementById('f_close_above_ma5').value === '1',
    min_limit_up_10d: parseInt(document.getElementById('f_min_limit_up_10d').value) || 0,
    turnover_min: parseFloat(document.getElementById('f_turnover_min').value) || 0,
    turnover_max: parseFloat(document.getElementById('f_turnover_max').value) || 999,
  };
}

// ── Build API URL ──
function buildUrl() {
  const f = getFilters();
  const params = new URLSearchParams();
  params.set('limit', '200');
  params.set('exclude_st', f.exclude_st ? 'true' : 'false');
  params.set('min_listed_days', f.min_listed_days);
  params.set('float_mcap_min', f.float_mcap_min);
  params.set('float_mcap_max', f.float_mcap_max);
  params.set('chg_20d_min', f.chg_20d_min);
  params.set('chg_20d_max', f.chg_20d_max);
  params.set('ma_bullish', f.ma_bullish ? 'true' : 'false');
  params.set('close_above_ma5', f.close_above_ma5 ? 'true' : 'false');
  params.set('min_limit_up_10d', f.min_limit_up_10d);
  params.set('turnover_min', f.turnover_min);
  params.set('turnover_max', f.turnover_max);
  params.set('sort', currentSort);
  params.set('full_market', screenerMode === 'full' ? 'true' : 'false');
  return '/api/screener?' + params.toString();
}

// ── Run Analysis ──
async function runAnalysis() {
  const btn = document.getElementById('btnAnalyze');
  btn.disabled = true;
  btn.textContent = '⏳ 分析中...';

  document.getElementById('loading').classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('errorMsg').textContent = '';
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';

  try {
    const url = buildUrl();
    const resp = await fetch(url);
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    results = data.data || [];
    document.getElementById('updateTime').textContent = '更新: ' + (data.update_time || '--');
    renderResults(data);
  } catch (e) {
    document.getElementById('errorMsg').textContent = '分析失败: ' + e.message;
    document.getElementById('errorMsg').classList.add('show');
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    document.getElementById('loading').classList.remove('show');
    btn.disabled = false;
    btn.textContent = '🔍 开始分析';
  }
}

// ── Render Results ──
function renderResults(data) {
  const section = document.getElementById('resultsSection');

  if (!results.length) {
    document.getElementById('emptyState').style.display = 'block';
    section.style.display = 'none';
    document.getElementById('emptyState').querySelector('p').innerHTML =
      '<b>当前股票池（209只精选股）未找到符合条件的股票</b><br><br>' +
      '<span style="font-size:12px;color:#999">建议尝试：</span><br>' +
      '<span style="font-size:13px">1. 放宽流通市值范围（如 10~500亿）<br>' +
      '2. 降低涨停次数要求（设为 0）<br>' +
      '3. 取消均线多头限制<br>' +
      '4. 扩大换手率范围</span>';
    return;
  }

  section.style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';

  // Summary bar
  const avgScore = (results.reduce((s, r) => s + r.score, 0) / results.length).toFixed(1);
  const sectors = {};
  results.forEach(r => { sectors[r.sector] = (sectors[r.sector] || 0) + 1; });
  const topSector = Object.entries(sectors).sort((a,b) => b[1]-a[1])[0];

  document.getElementById('summaryBar').innerHTML = `
    <div class="stat"><div class="num">${results.length}</div><div class="lbl">符合条件</div></div>
    <div class="stat"><div class="num">${avgScore}</div><div class="lbl">平均评分</div></div>
    <div class="stat"><div class="num">${topSector ? topSector[0] : '--'}</div><div class="lbl">最多行业</div></div>
    <div class="stat"><div class="num">${Object.keys(sectors).length}</div><div class="lbl">涉及行业</div></div>
  `;

  // Table
  const tbody = document.getElementById('resultsBody');
  tbody.innerHTML = results.map(r => {
    const chgCls = r.change_pct > 0 ? 'up' : r.change_pct < 0 ? 'down' : '';
    const maCls = r.ma_status === '多头' ? 'tag tag-bull' :
      r.ma_status === '空头' ? 'tag tag-bear' : 'tag tag-neutral';
    const macdCls = r.macd_status === 'golden' ? 'tag tag-gold' :
      r.macd_status === 'positive' ? 'tag tag-bull' : 'tag tag-neutral';
    return `<tr>
      <td><span class="stock-code">${r.code}</span></td>
      <td><span class="stock-name">${r.name}</span></td>
      <td>${r.price.toFixed(2)}</td>
      <td class="${chgCls}">${r.change_pct > 0 ? '+' : ''}${r.change_pct.toFixed(2)}%</td>
      <td>${r.pe ? r.pe.toFixed(1) : '--'}</td>
      <td>${r.float_mcap ? r.float_mcap.toFixed(1) + '亿' : '--'}</td>
      <td>${r.turnover.toFixed(2)}%</td>
      <td>${r.chg_20d ? (r.chg_20d > 0 ? '+' : '') + r.chg_20d.toFixed(2) + '%' : '--'}</td>
      <td><span class="${maCls}">${r.ma_status}</span></td>
      <td>${r.limit_up_count_10d}</td>
      <td><b>${r.score.toFixed(1)}</b></td>
    </tr>`;
  }).join('');

  // Re-apply sort arrows
  updateSortArrows();

  // Analysis
  renderAnalysis();
}

// ── Sort Table ──
function sortTable(field) {
  if (currentSort === field) {
    sortDir = -sortDir;
  } else {
    currentSort = field;
    sortDir = -1;
  }
  // Re-fetch from server
  runAnalysis();
}

function updateSortArrows() {
  document.querySelectorAll('th .sort-arrow').forEach(el => el.textContent = '');
  const th = document.querySelector(`th[data-sort="${currentSort}"]`);
  if (th) th.querySelector('.sort-arrow').textContent = sortDir === -1 ? ' ▼' : ' ▲';
}

// ── Analysis Report ──
function renderAnalysis() {
  const grid = document.getElementById('analysisGrid');

  // 1. Key stats
  const peList = results.filter(r => r.pe).map(r => r.pe);
  const avgPE = peList.length ? (peList.reduce((a,b)=>a+b,0)/peList.length).toFixed(1) : '--';
  const medPE = peList.length ? median(peList).toFixed(1) : '--';

  const chgList = results.map(r => r.change_pct);
  const avgChg = (chgList.reduce((a,b)=>a+b,0)/chgList.length).toFixed(2);

  const bullCount = results.filter(r => r.ma_status === '多头').length;
  const goldenCount = results.filter(r => r.macd_status === 'golden').length;
  const limitUpTotal = results.reduce((s, r) => s + r.limit_up_count_10d, 0);

  // 2. Sector breakdown
  const sectors = {};
  results.forEach(r => {
    const s = r.sector || '其他';
    sectors[s] = (sectors[s] || 0) + 1;
  });
  const sectorHTML = Object.entries(sectors)
    .sort((a, b) => b[1] - a[1])
    .map(([name, cnt]) => `<div class="item"><span class="label">${name}</span><span class="value">${cnt} 只 (${(cnt/results.length*100).toFixed(0)}%)</span></div>`)
    .join('');

  // 3. Score distribution
  const scoreBuckets = { '90-100': 0, '80-90': 0, '70-80': 0, '60-70': 0, '<60': 0 };
  results.forEach(r => {
    if (r.score >= 90) scoreBuckets['90-100']++;
    else if (r.score >= 80) scoreBuckets['80-90']++;
    else if (r.score >= 70) scoreBuckets['70-80']++;
    else if (r.score >= 60) scoreBuckets['60-70']++;
    else scoreBuckets['<60']++;
  });
  const scoreHTML = Object.entries(scoreBuckets)
    .filter(([_, c]) => c > 0)
    .map(([range, cnt]) => {
      const bar = '█'.repeat(Math.max(1, Math.round(cnt / results.length * 20)));
      return `<div class="item"><span class="label">${range}</span><span class="value">${bar} ${cnt}只</span></div>`;
    }).join('');

  // 4. Risk/market cap distribution
  const mcapList = results.filter(r => r.float_mcap).map(r => r.float_mcap);
  const avgMcap = mcapList.length ? (mcapList.reduce((a,b)=>a+b,0)/mcapList.length).toFixed(1) : '--';

  // 5. Insights
  const insights = [];
  if (results.length < 5) insights.push({ cls: 'warn', txt: `仅筛选出 ${results.length} 只股票，条件较严格，可适当放宽` });
  else if (results.length > 100) insights.push({ cls: 'insight', txt: `筛选出 ${results.length} 只股票，数量较多，可收紧条件提高精准度` });
  else insights.push({ cls: 'good', txt: `筛选出 ${results.length} 只股票，数量适中，条件设置合理` });

  if (bullCount === results.length) insights.push({ cls: 'good', txt: '全部股票均处于均线多头排列，趋势强劲' });
  else if (bullCount > results.length * 0.7) insights.push({ cls: 'insight', txt: `${bullCount}/${results.length} 只处于均线多头排列，整体趋势向好` });

  if (avgPE !== '--' && parseFloat(avgPE) > 100) insights.push({ cls: 'warn', txt: `平均PE ${avgPE}，估值整体偏高，注意风险` });
  else if (avgPE !== '--' && parseFloat(avgPE) < 20) insights.push({ cls: 'good', txt: `平均PE ${avgPE}，估值整体偏低，具有一定安全边际` });

  if (goldenCount > 0) insights.push({ cls: 'good', txt: `${goldenCount} 只出现MACD金叉信号` });

  if (limitUpTotal > 0) insights.push({ cls: 'insight', txt: `近10天累计涨停 ${limitUpTotal} 次，存在短线活跃资金关注` });

  grid.innerHTML = `
    <div class="analysis-box">
      <h4>📊 核心统计</h4>
      <div class="item"><span class="label">平均PE</span><span class="value">${avgPE}</span></div>
      <div class="item"><span class="label">PE中位数</span><span class="value">${medPE}</span></div>
      <div class="item"><span class="label">平均涨跌幅</span><span class="value">${avgChg > 0 ? '+' : ''}${avgChg}%</span></div>
      <div class="item"><span class="label">平均流通市值</span><span class="value">${avgMcap} 亿</span></div>
      <div class="item"><span class="label">多头排列</span><span class="value">${bullCount} / ${results.length}</span></div>
      <div class="item"><span class="label">MACD金叉</span><span class="value">${goldenCount} 只</span></div>
    </div>
    <div class="analysis-box">
      <h4>🏭 行业分布</h4>
      ${sectorHTML || '<div class="item"><span class="label">--</span></div>'}
    </div>
    <div class="analysis-box">
      <h4>⭐ 评分分布</h4>
      ${scoreHTML || '<div class="item"><span class="label">--</span></div>'}
      <div style="margin-top: 8px;">
        ${insights.map(i => `<div class="insight ${i.cls}">${i.txt}</div>`).join('')}
      </div>
    </div>
  `;
}

function median(arr) {
  const sorted = [...arr].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
}

// ── Reset to defaults ──
function resetDefaults() {
  document.getElementById('f_exclude_st').value = '1';
  document.getElementById('f_min_listed_days').value = 60;
  document.getElementById('f_float_mcap_min').value = 30;
  document.getElementById('f_float_mcap_max').value = 120;
  document.getElementById('f_chg_20d_min').value = 0;
  document.getElementById('f_chg_20d_max').value = 50;
  document.getElementById('f_ma_bullish').value = '1';
  document.getElementById('f_close_above_ma5').value = '1';
  document.getElementById('f_min_limit_up_10d').value = 1;
  document.getElementById('f_turnover_min').value = 3;
  document.getElementById('f_turnover_max').value = 15;
}

// ── Export CSV ──
function exportCSV() {
  if (!results.length) return alert('没有数据可导出');
  const headers = ['代码','名称','现价','涨跌幅%','PE','PB','流通市值','换手率%','20日涨幅%','均线','RSI','MACD','涨停(10d)','评分'];
  const rows = results.map(r => [
    r.code, r.name, r.price, r.change_pct, r.pe||'', r.pb||'',
    r.float_mcap, r.turnover, r.chg_20d||'', r.ma_status,
    r.rsi_14||'', r.macd_status, r.limit_up_count_10d, r.score
  ]);
  const csv = '\uFEFF' + headers.join(',') + '\n' + rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `选股结果_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url);
}
